[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置
addopts = 
    --cov=module_ai/skills
    --cov=module_ai/service
    --cov-report=html
    --cov-report=term-missing
    --verbose
    -v

# 标记
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
